<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gem Crush</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  overflow: hidden;
  user-select: none;
}
h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #e74c3c, #f39c12, #2ecc71, #3498db, #9b59b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.info {
  display: flex;
  gap: 15px;
  margin-bottom: 10px;
  align-items: center;
}
.panel {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 18px;
  text-align: center;
}
.panel .label { font-size: 11px; color: #888; text-transform: uppercase; }
.panel .value { font-size: 22px; font-weight: 700; color: #f7dc6f; }
.btn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a1a40; }
canvas { border-radius: 10px; display: block; cursor: pointer; }
.footer { margin-top: 12px; font-size: 14px; }
.footer a { color: #f7dc6f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Gem Crush</h1>
<div class="info">
  <div class="panel"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="panel"><div class="label">Moves</div><div class="value" id="moves">0</div></div>
  <button class="btn" onclick="init()">New Game</button>
</div>
<canvas id="canvas"></canvas>
<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const movesEl = document.getElementById('moves');

const ROWS = 8, COLS = 8;
const CELL = Math.min(Math.floor((Math.min(window.innerWidth, 500) - 30) / COLS), 56);
const PAD = 4;
const GEM_R = (CELL - PAD * 2) / 2;
const W = COLS * CELL, H = ROWS * CELL;
canvas.width = W; canvas.height = H;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';

const GEMS = [
  { color: '#e74c3c', glow: '#ff6b6b', shape: 'diamond' },   // red
  { color: '#f39c12', glow: '#ffc048', shape: 'circle' },     // orange
  { color: '#f1c40f', glow: '#ffe066', shape: 'star' },       // yellow
  { color: '#2ecc71', glow: '#6eff9e', shape: 'triangle' },   // green
  { color: '#3498db', glow: '#5dade2', shape: 'square' },     // blue
  { color: '#9b59b6', glow: '#c39bd3', shape: 'hexagon' },    // purple
];

let grid;       // grid[r][c] = gem index (0-5) or -1
let posY;       // posY[r][c] = current Y pixel offset for animation
let score, moves;
let selected;   // {r,c} or null
let animating;  // true during fall/remove animations
let removing;   // Set of "r,c" being removed (for flash)
let animFrame;
let combo;

function init() {
  score = 0; moves = 0; combo = 0;
  scoreEl.textContent = 0;
  movesEl.textContent = 0;
  selected = null;
  animating = false;
  removing = new Set();
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(-1));
  posY = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  // fill without initial matches
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let g;
      do { g = Math.random() * GEMS.length | 0; }
      while (wouldMatch(r, c, g));
      grid[r][c] = g;
    }
  }
  // ensure at least one valid move
  if (!hasValidMove()) init();
  else draw();
}

function wouldMatch(r, c, g) {
  // check left
  if (c >= 2 && grid[r][c-1] === g && grid[r][c-2] === g) return true;
  // check up
  if (r >= 2 && grid[r-1][c] === g && grid[r-2][c] === g) return true;
  return false;
}

// --- Drawing ---
function draw() {
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0, 0, W, H);

  // grid bg
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#16213e' : '#1a1a35';
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  // gems
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const g = grid[r][c];
      if (g < 0) continue;
      const cx = c * CELL + CELL / 2;
      const cy = r * CELL + CELL / 2 + posY[r][c];
      const key = r + ',' + c;
      const flash = removing.has(key);
      drawGem(cx, cy, g, selected && selected.r === r && selected.c === c, flash);
    }
  }
}

function drawGem(cx, cy, g, sel, flash) {
  const gem = GEMS[g];
  const r = GEM_R;

  ctx.save();
  if (flash) {
    ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.02) * 0.3;
  }

  // glow for selected
  if (sel) {
    ctx.shadowColor = gem.glow;
    ctx.shadowBlur = 18;
  }

  ctx.fillStyle = gem.color;
  ctx.strokeStyle = gem.glow;
  ctx.lineWidth = 1.5;

  switch (gem.shape) {
    case 'diamond':
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r, cy);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      break;
    case 'circle':
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.85, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      break;
    case 'star':
      drawStar(cx, cy, 5, r, r * 0.45);
      ctx.fill(); ctx.stroke();
      break;
    case 'triangle':
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r * 0.9, cy + r * 0.7);
      ctx.lineTo(cx - r * 0.9, cy + r * 0.7);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      break;
    case 'square':
      ctx.beginPath();
      ctx.roundRect(cx - r * 0.75, cy - r * 0.75, r * 1.5, r * 1.5, 5);
      ctx.fill(); ctx.stroke();
      break;
    case 'hexagon':
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        const px = cx + r * 0.85 * Math.cos(a);
        const py = cy + r * 0.85 * Math.sin(a);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      break;
  }

  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.arc(cx - r * 0.2, cy - r * 0.25, r * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // selection ring
  if (sel) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawStar(cx, cy, points, outer, inner) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    const a = Math.PI / points * i - Math.PI / 2;
    const px = cx + r * Math.cos(a);
    const py = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// --- Interaction ---
function getCell(ex, ey) {
  const rect = canvas.getBoundingClientRect();
  const x = (ex - rect.left) / rect.width * W;
  const y = (ey - rect.top) / rect.height * H;
  const c = x / CELL | 0, r = y / CELL | 0;
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return {r, c};
  return null;
}

let dragStart = null;

canvas.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
canvas.addEventListener('mouseup', e => onUp(e.clientX, e.clientY));
canvas.addEventListener('touchend', e => { e.preventDefault(); onUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, {passive: false});

function onDown(ex, ey) {
  if (animating) return;
  dragStart = getCell(ex, ey);
  if (!dragStart) return;

  if (selected) {
    const dr = Math.abs(selected.r - dragStart.r);
    const dc = Math.abs(selected.c - dragStart.c);
    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
      trySwap(selected, dragStart);
      selected = null;
      draw();
      return;
    }
  }
  selected = dragStart;
  draw();
}

function onUp(ex, ey) {
  if (animating || !dragStart) return;
  const end = getCell(ex, ey);
  if (!end) { dragStart = null; return; }
  if (end.r === dragStart.r && end.c === dragStart.c) { dragStart = null; return; }
  const dr = Math.abs(end.r - dragStart.r);
  const dc = Math.abs(end.c - dragStart.c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    selected = null;
    trySwap(dragStart, end);
  }
  dragStart = null;
  draw();
}

// --- Game logic ---
function swap(a, b) {
  const t = grid[a.r][a.c];
  grid[a.r][a.c] = grid[b.r][b.c];
  grid[b.r][b.c] = t;
}

function trySwap(a, b) {
  swap(a, b);
  const matches = findMatches();
  if (matches.size === 0) {
    swap(a, b); // swap back
    return;
  }
  moves++;
  movesEl.textContent = moves;
  combo = 0;
  processMatches(matches);
}

function findMatches() {
  const matched = new Set();
  // horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const g = grid[r][c];
      if (g < 0) continue;
      let len = 1;
      while (c + len < COLS && grid[r][c + len] === g) len++;
      if (len >= 3) {
        for (let i = 0; i < len; i++) matched.add(r + ',' + (c + i));
      }
      c += len - 1;
    }
  }
  // vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const g = grid[r][c];
      if (g < 0) continue;
      let len = 1;
      while (r + len < ROWS && grid[r + len][c] === g) len++;
      if (len >= 3) {
        for (let i = 0; i < len; i++) matched.add((r + i) + ',' + c);
      }
      r += len - 1;
    }
  }
  return matched;
}

function processMatches(matches) {
  animating = true;
  removing = matches;
  combo++;

  // flash animation then remove
  let flashCount = 0;
  const flashInterval = setInterval(() => {
    draw();
    flashCount++;
    if (flashCount > 8) {
      clearInterval(flashInterval);
      // add score
      const pts = matches.size * 10 * combo;
      score += pts;
      scoreEl.textContent = score;

      // remove matched
      for (const key of matches) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = -1;
      }
      removing = new Set();
      draw();

      // gravity
      setTimeout(() => {
        applyGravity();
      }, 80);
    }
  }, 40);
}

function applyGravity() {
  // for each column, drop gems down
  let maxDrop = 0;
  const drops = Array.from({length: ROWS}, () => Array(COLS).fill(0));

  for (let c = 0; c < COLS; c++) {
    let writeR = ROWS - 1;
    // move existing gems down
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] >= 0) {
        if (writeR !== r) {
          grid[writeR][c] = grid[r][c];
          grid[r][c] = -1;
          drops[writeR][c] = (writeR - r) * CELL;
        }
        writeR--;
      }
    }
    // fill empty top with new gems
    for (let r = writeR; r >= 0; r--) {
      grid[r][c] = Math.random() * GEMS.length | 0;
      drops[r][c] = (writeR - r + 1) * CELL;
    }
    maxDrop = Math.max(maxDrop, drops[writeR >= 0 ? 0 : 0][c]);
  }

  // set initial offsets
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      posY[r][c] = -drops[r][c];

  // animate falling
  animateFall(() => {
    // check for chain matches
    const matches = findMatches();
    if (matches.size > 0) {
      processMatches(matches);
    } else {
      animating = false;
      // check if moves exist
      if (!hasValidMove()) {
        shuffle();
      }
    }
  });
}

function animateFall(cb) {
  const speed = 12;
  function step() {
    let moving = false;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (posY[r][c] < 0) {
          posY[r][c] = Math.min(0, posY[r][c] + speed);
          moving = true;
        }
      }
    }
    draw();
    if (moving) requestAnimationFrame(step);
    else cb();
  }
  requestAnimationFrame(step);
}

function hasValidMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // try swap right
      if (c < COLS - 1) {
        swap({r, c}, {r, c: c+1});
        if (findMatches().size > 0) { swap({r, c}, {r, c: c+1}); return true; }
        swap({r, c}, {r, c: c+1});
      }
      // try swap down
      if (r < ROWS - 1) {
        swap({r, c}, {r: r+1, c});
        if (findMatches().size > 0) { swap({r, c}, {r: r+1, c}); return true; }
        swap({r, c}, {r: r+1, c});
      }
    }
  }
  return false;
}

function shuffle() {
  // reshuffle until no matches but valid moves exist
  let attempts = 0;
  do {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        grid[r][c] = Math.random() * GEMS.length | 0;
    // remove any existing matches
    while (findMatches().size > 0) {
      for (const key of findMatches()) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = Math.random() * GEMS.length | 0;
      }
    }
    attempts++;
  } while (!hasValidMove() && attempts < 50);
  draw();
}

init();
</script>
</body>
</html>
