<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  overflow: hidden;
}
h1 {
  font-size: 38px;
  font-weight: 800;
  background: linear-gradient(135deg, #e74c3c, #f39c12, #2ecc71, #3498db, #9b59b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.info {
  display: flex;
  gap: 15px;
  margin-bottom: 10px;
  align-items: center;
}
.panel {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 18px;
  text-align: center;
}
.panel .label { font-size: 11px; color: #888; text-transform: uppercase; }
.panel .value { font-size: 22px; font-weight: 700; color: #f7dc6f; }
.btn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a1a40; }
canvas { border-radius: 8px; display: block; cursor: pointer; }
.footer { margin-top: 12px; font-size: 14px; }
.footer a { color: #f7dc6f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Breakout</h1>
<div class="info">
  <div class="panel"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="panel"><div class="label">Lives</div><div class="value" id="lives">3</div></div>
  <div class="panel"><div class="label">Level</div><div class="value" id="level">1</div></div>
  <button class="btn" onclick="startGame()">New Game</button>
</div>
<canvas id="canvas"></canvas>
<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');

const W = Math.min(480, window.innerWidth - 30);
const H = Math.round(W * 1.35);
canvas.width = W; canvas.height = H;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';

// brick layout
const BRICK_ROWS = 6, BRICK_COLS = 8;
const BRICK_PAD = 4;
const BRICK_TOP = 50;
const BRICK_W = (W - BRICK_PAD * (BRICK_COLS + 1)) / BRICK_COLS;
const BRICK_H = 18;

const ROW_COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6'];

const PADDLE_H = 12;
const PADDLE_W_BASE = 80;
const BALL_R = 6;

let paddle, ball, bricks, score, lives, level, state, animId;
let paddleW;

function buildBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_PAD + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W,
        h: BRICK_H,
        color: ROW_COLORS[r % ROW_COLORS.length],
        alive: true,
        points: (BRICK_ROWS - r) * 10
      });
    }
  }
}

function resetBall() {
  ball = {
    x: W / 2,
    y: H - 40 - BALL_R,
    dx: (Math.random() > 0.5 ? 1 : -1) * 3,
    dy: -4,
    speed: 4 + level * 0.3
  };
  normalizeSpeed();
}

function normalizeSpeed() {
  const mag = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
  ball.dx = ball.dx / mag * ball.speed;
  ball.dy = ball.dy / mag * ball.speed;
}

function startGame() {
  score = 0; lives = 3; level = 1;
  paddleW = PADDLE_W_BASE;
  scoreEl.textContent = 0; livesEl.textContent = 3; levelEl.textContent = 1;
  paddle = { x: W / 2 - paddleW / 2 };
  buildBricks();
  resetBall();
  state = 'ready';
  cancelAnimationFrame(animId);
  loop();
}

function nextLevel() {
  level++;
  levelEl.textContent = level;
  paddleW = Math.max(50, PADDLE_W_BASE - level * 3);
  buildBricks();
  resetBall();
  state = 'ready';
}

// --- Input ---
let keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
  if (state === 'ready' && (e.key === ' ' || e.key === 'ArrowUp')) { e.preventDefault(); state = 'play'; }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// mouse / touch
let pointerX = null;
function onPointer(x) {
  const rect = canvas.getBoundingClientRect();
  pointerX = (x - rect.left) / rect.width * W;
}
canvas.addEventListener('mousemove', e => onPointer(e.clientX));
canvas.addEventListener('touchmove', e => { e.preventDefault(); onPointer(e.touches[0].clientX); }, {passive: false});
canvas.addEventListener('click', () => { if (state === 'ready') state = 'play'; });
canvas.addEventListener('touchstart', e => {
  onPointer(e.touches[0].clientX);
  if (state === 'ready') state = 'play';
}, {passive: true});

function updatePaddle() {
  const spd = 6;
  if (keys['ArrowLeft'] || keys['a']) paddle.x -= spd;
  if (keys['ArrowRight'] || keys['d']) paddle.x += spd;
  if (pointerX !== null) paddle.x = pointerX - paddleW / 2;
  paddle.x = Math.max(0, Math.min(W - paddleW, paddle.x));
}

function update() {
  if (state !== 'play') return;
  updatePaddle();

  ball.x += ball.dx;
  ball.y += ball.dy;

  // wall bounce
  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); }
  if (ball.x + BALL_R >= W) { ball.x = W - BALL_R; ball.dx = -Math.abs(ball.dx); }
  if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.dy = Math.abs(ball.dy); }

  // paddle bounce
  const py = H - 30;
  if (ball.dy > 0 && ball.y + BALL_R >= py && ball.y + BALL_R <= py + PADDLE_H + 4 &&
      ball.x >= paddle.x && ball.x <= paddle.x + paddleW) {
    ball.y = py - BALL_R;
    // angle based on hit position
    const hit = (ball.x - paddle.x) / paddleW; // 0..1
    const angle = (hit - 0.5) * Math.PI * 0.7; // -63° to +63°
    ball.dx = Math.sin(angle) * ball.speed;
    ball.dy = -Math.cos(angle) * ball.speed;
  }

  // brick collision
  for (const b of bricks) {
    if (!b.alive) continue;
    if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
        ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {
      b.alive = false;
      score += b.points;
      scoreEl.textContent = score;

      // determine bounce direction
      const overlapL = ball.x + BALL_R - b.x;
      const overlapR = b.x + b.w - (ball.x - BALL_R);
      const overlapT = ball.y + BALL_R - b.y;
      const overlapB = b.y + b.h - (ball.y - BALL_R);
      const minO = Math.min(overlapL, overlapR, overlapT, overlapB);
      if (minO === overlapT || minO === overlapB) ball.dy = -ball.dy;
      else ball.dx = -ball.dx;
      break; // one brick per frame
    }
  }

  // ball lost
  if (ball.y - BALL_R > H) {
    lives--;
    livesEl.textContent = lives;
    if (lives <= 0) {
      state = 'over';
    } else {
      resetBall();
      state = 'ready';
    }
  }

  // level clear
  if (bricks.every(b => !b.alive)) {
    nextLevel();
  }
}

function draw() {
  // background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(b.x, b.y, b.w, 3);
    ctx.fillRect(b.x, b.y, 3, b.h);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(b.x, b.y + b.h - 2, b.w, 2);
  }

  // paddle
  const py = H - 30;
  const grad = ctx.createLinearGradient(paddle.x, py, paddle.x, py + PADDLE_H);
  grad.addColorStop(0, '#ecf0f1');
  grad.addColorStop(1, '#95a5a6');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(paddle.x, py, paddleW, PADDLE_H, 4);
  ctx.fill();

  // ball
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // overlays
  if (state === 'ready') {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f7dc6f';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Click or Press Space', W / 2, H / 2 + 40);
  }

  if (state === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', W / 2, H / 2 - 10);
    ctx.fillStyle = '#f7dc6f';
    ctx.font = '18px sans-serif';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 25);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px sans-serif';
    ctx.fillText('Click "New Game" to restart', W / 2, H / 2 + 55);
  }
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

startGame();
</script>
</body>
</html>
