<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  touch-action: none;
  overflow: hidden;
}
h1 {
  font-size: 48px;
  font-weight: 800;
  background: linear-gradient(135deg, #f7dc6f, #e67e22);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.header {
  display: flex;
  align-items: center;
  gap: 30px;
  margin-bottom: 15px;
}
.score-box {
  background: #16213e;
  border-radius: 8px;
  padding: 8px 20px;
  text-align: center;
  min-width: 100px;
}
.score-box .label {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
}
.score-box .value {
  font-size: 24px;
  font-weight: 700;
  color: #f7dc6f;
}
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
.btn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a1a40; }
.board {
  background: #16213e;
  border-radius: 12px;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  width: min(420px, calc(100vw - 40px));
  aspect-ratio: 1;
}
.cell {
  background: #0f3460;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 32px;
  transition: all 0.12s ease;
  aspect-ratio: 1;
}
.cell[data-value="2"]    { background: #2c3e50; color: #ecf0f1; }
.cell[data-value="4"]    { background: #34495e; color: #ecf0f1; }
.cell[data-value="8"]    { background: #e67e22; color: #fff; }
.cell[data-value="16"]   { background: #d35400; color: #fff; }
.cell[data-value="32"]   { background: #e74c3c; color: #fff; }
.cell[data-value="64"]   { background: #c0392b; color: #fff; }
.cell[data-value="128"]  { background: #f1c40f; color: #fff; font-size: 28px; }
.cell[data-value="256"]  { background: #f39c12; color: #fff; font-size: 28px; }
.cell[data-value="512"]  { background: #27ae60; color: #fff; font-size: 28px; }
.cell[data-value="1024"] { background: #2ecc71; color: #fff; font-size: 22px; }
.cell[data-value="2048"] { background: #9b59b6; color: #fff; font-size: 22px; }
.cell.super              { background: #8e44ad; color: #fff; font-size: 18px; }
.cell.pop {
  animation: pop 0.15s ease;
}
@keyframes pop {
  0% { transform: scale(0); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.overlay.show { display: flex; }
.overlay-box {
  background: #16213e;
  border-radius: 16px;
  padding: 40px;
  text-align: center;
}
.overlay-box h2 {
  font-size: 36px;
  margin-bottom: 10px;
}
.overlay-box p {
  font-size: 18px;
  color: #aaa;
  margin-bottom: 20px;
}
.overlay-box .btn {
  font-size: 18px;
  padding: 12px 30px;
}
.footer {
  margin-top: 20px;
  font-size: 14px;
}
.footer a {
  color: #f7dc6f;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>2048</h1>

<div class="header">
  <div class="score-box">
    <div class="label">Score</div>
    <div class="value" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="label">Best</div>
    <div class="value" id="best">0</div>
  </div>
</div>

<div class="controls">
  <button class="btn" onclick="newGame()">New Game</button>
</div>

<div class="board" id="board"></div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="overlay-title">Game Over</h2>
    <p id="overlay-msg"></p>
    <button class="btn" onclick="newGame()">Try Again</button>
  </div>
</div>

<div class="footer">
  <a href="../index.html">&larr; Back</a>
</div>

<script>
const SIZE = 4;
let grid, score, best = +localStorage.getItem('2048_best') || 0;
let won = false, over = false;

const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');

bestEl.textContent = best;

function newGame() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0; won = false; over = false;
  scoreEl.textContent = 0;
  overlay.classList.remove('show');
  addTile();
  addTile();
  render();
}

function addTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!grid[r][c]) empty.push([r, c]);
  if (!empty.length) return;
  const [r, c] = empty[Math.random() * empty.length | 0];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  boardEl.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const v = grid[r][c];
      if (v) {
        cell.textContent = v;
        cell.dataset.value = v;
        if (v > 2048) cell.classList.add('super');
      }
      boardEl.appendChild(cell);
    }
  }
}

function slide(row) {
  let arr = row.filter(v => v);
  let merged = false;
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      score += arr[i];
      arr.splice(i + 1, 1);
      merged = true;
    }
  }
  while (arr.length < SIZE) arr.push(0);
  return { result: arr, changed: row.some((v, i) => v !== arr[i]) };
}

function move(dir) {
  if (over) return;
  let changed = false;
  const g = grid;

  if (dir === 'left') {
    for (let r = 0; r < SIZE; r++) {
      const s = slide(g[r]);
      if (s.changed) { g[r] = s.result; changed = true; }
    }
  } else if (dir === 'right') {
    for (let r = 0; r < SIZE; r++) {
      const s = slide([...g[r]].reverse());
      if (s.changed) { g[r] = s.result.reverse(); changed = true; }
    }
  } else if (dir === 'up') {
    for (let c = 0; c < SIZE; c++) {
      const col = [g[0][c], g[1][c], g[2][c], g[3][c]];
      const s = slide(col);
      if (s.changed) { for (let r = 0; r < SIZE; r++) g[r][c] = s.result[r]; changed = true; }
    }
  } else if (dir === 'down') {
    for (let c = 0; c < SIZE; c++) {
      const col = [g[3][c], g[2][c], g[1][c], g[0][c]];
      const s = slide(col);
      if (s.changed) { for (let r = 0; r < SIZE; r++) g[r][c] = s.result[3 - r]; changed = true; }
    }
  }

  if (!changed) return;

  scoreEl.textContent = score;
  if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('2048_best', best); }

  addTile();
  render();

  // animate new tiles
  const cells = boardEl.querySelectorAll('.cell');
  cells.forEach(c => { if (c.dataset.value) c.classList.add('pop'); });

  // check win
  if (!won) {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 2048) {
          won = true;
          showOverlay('You Win!', 'Score: ' + score);
          return;
        }
  }

  // check game over
  if (isGameOver()) {
    over = true;
    showOverlay('Game Over', 'Final Score: ' + score);
  }
}

function isGameOver() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) return false;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
      if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
    }
  return true;
}

function showOverlay(title, msg) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  overlay.classList.add('show');
}

// Keyboard
document.addEventListener('keydown', e => {
  const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Touch / swipe
let tx, ty;
document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if (Math.max(ax, ay) < 30) return;
  if (ax > ay) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});

newGame();
</script>
</body>
</html>
