<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Cards</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
}
h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #f39c12, #e74c3c, #9b59b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
}
.btn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a1a40; }
.btn.active { border-color: #f7dc6f; color: #f7dc6f; }
.stats {
  display: flex;
  gap: 15px;
  margin-bottom: 12px;
  align-items: center;
}
.panel {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 16px;
  text-align: center;
  min-width: 70px;
}
.panel .label { font-size: 10px; color: #888; text-transform: uppercase; }
.panel .value { font-size: 20px; font-weight: 700; color: #f7dc6f; font-variant-numeric: tabular-nums; }
.board {
  display: grid;
  gap: 8px;
  perspective: 800px;
  justify-content: center;
}
.card {
  width: var(--card);
  height: var(--card);
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s ease;
  -webkit-tap-highlight-color: transparent;
}
.card.flipped { transform: rotateY(180deg); }
.card.matched { transform: rotateY(180deg); }
.card.matched .front { box-shadow: 0 0 15px rgba(46,204,113,0.5); border-color: #2ecc71; }
.card-face {
  position: absolute;
  inset: 0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.back {
  background: linear-gradient(135deg, #0f3460, #16213e);
  border: 2px solid #334;
}
.back-pattern {
  font-size: calc(var(--card) * 0.35);
  opacity: 0.3;
}
.front {
  background: #16213e;
  border: 2px solid #333;
  transform: rotateY(180deg);
  font-size: calc(var(--card) * 0.45);
}
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.overlay.show { display: flex; }
.overlay-box {
  background: #16213e;
  border-radius: 16px;
  padding: 35px 45px;
  text-align: center;
}
.overlay-box h2 { font-size: 32px; margin-bottom: 8px; color: #f7dc6f; }
.overlay-box p { font-size: 16px; color: #aaa; margin-bottom: 18px; }
.overlay-box .btn { font-size: 16px; padding: 10px 28px; }
.footer { margin-top: 12px; font-size: 14px; }
.footer a { color: #f7dc6f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Memory Cards</h1>

<div class="toolbar">
  <button class="btn active" data-size="4" onclick="setSize(4)">4x4</button>
  <button class="btn" data-size="6" onclick="setSize(6)">4x6</button>
  <button class="btn" data-size="8" onclick="setSize(8)">4x8</button>
  <button class="btn" onclick="newGame()">New Game</button>
</div>

<div class="stats">
  <div class="panel"><div class="label">Moves</div><div class="value" id="moves">0</div></div>
  <div class="panel"><div class="label">Pairs</div><div class="value" id="pairs">0/8</div></div>
  <div class="panel"><div class="label">Time</div><div class="value" id="timer">0</div></div>
</div>

<div class="board" id="board"></div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="winTitle">Well Done!</h2>
    <p id="winMsg"></p>
    <button class="btn" onclick="newGame()">Play Again</button>
  </div>
</div>

<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
const ALL_EMOJI = [
  '🐶','🐱','🐼','🦊','🐸','🦁','🐯','🐮',
  '🐷','🐵','🦄','🐙','🦋','🐢','🐬','🦉',
  '🍎','🍕','🎸','🚀','⭐','🌈','🔥','💎',
  '🎯','🎲','🏆','🎪','🌻','🍄','🎃','❄️'
];

const boardEl = document.getElementById('board');
const movesEl = document.getElementById('moves');
const pairsEl = document.getElementById('pairs');
const timerEl = document.getElementById('timer');
const overlay = document.getElementById('overlay');

let gridCols = 4, gridRows = 4, totalPairs;
let cards, flippedCards, matchedCount, moveCount, locked;
let elapsed, timerInterval, started;

function setSize(cols) {
  gridCols = cols;
  gridRows = 4;
  document.querySelectorAll('.toolbar .btn[data-size]').forEach(b =>
    b.classList.toggle('active', +b.dataset.size === cols));
  newGame();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function newGame() {
  totalPairs = (gridRows * gridCols) / 2;
  const emojis = shuffle([...ALL_EMOJI]).slice(0, totalPairs);
  cards = shuffle([...emojis, ...emojis]);
  flippedCards = [];
  matchedCount = 0;
  moveCount = 0;
  locked = false;
  started = false;
  elapsed = 0;
  clearInterval(timerInterval);
  movesEl.textContent = '0';
  pairsEl.textContent = `0/${totalPairs}`;
  timerEl.textContent = '0';
  overlay.classList.remove('show');

  const cardSize = Math.min(
    Math.floor((Math.min(window.innerWidth, 560) - 30 - (gridCols - 1) * 8) / gridCols),
    90
  );
  boardEl.style.setProperty('--card', cardSize + 'px');
  boardEl.style.gridTemplateColumns = `repeat(${gridCols}, var(--card))`;
  boardEl.innerHTML = '';

  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-face back"><span class="back-pattern">&#x2666;</span></div>
      <div class="card-face front">${emoji}</div>
    `;
    card.addEventListener('click', () => onCardClick(i, card));
    boardEl.appendChild(card);
  });
}

function onCardClick(index, cardEl) {
  if (locked) return;
  if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
  if (flippedCards.length >= 2) return;

  if (!started) {
    started = true;
    timerInterval = setInterval(() => {
      elapsed++;
      timerEl.textContent = elapsed;
    }, 1000);
  }

  cardEl.classList.add('flipped');
  flippedCards.push({ index, el: cardEl, emoji: cards[index] });

  if (flippedCards.length === 2) {
    moveCount++;
    movesEl.textContent = moveCount;

    const [a, b] = flippedCards;
    if (a.emoji === b.emoji) {
      // match
      setTimeout(() => {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        matchedCount++;
        pairsEl.textContent = `${matchedCount}/${totalPairs}`;
        flippedCards = [];

        if (matchedCount === totalPairs) {
          clearInterval(timerInterval);
          setTimeout(showWin, 400);
        }
      }, 300);
    } else {
      // no match
      locked = true;
      setTimeout(() => {
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        flippedCards = [];
        locked = false;
      }, 800);
    }
  }
}

function showWin() {
  document.getElementById('winTitle').textContent = 'Well Done!';
  const stars = moveCount <= totalPairs * 1.5 ? '⭐⭐⭐' :
                moveCount <= totalPairs * 2.5 ? '⭐⭐' : '⭐';
  document.getElementById('winMsg').textContent =
    `${stars}  ${moveCount} moves in ${elapsed}s`;
  overlay.classList.add('show');
}

newGame();
</script>
</body>
</html>
