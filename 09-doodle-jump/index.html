<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  overflow: hidden;
}
h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #2ecc71, #27ae60, #f1c40f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.info {
  display: flex;
  gap: 15px;
  margin-bottom: 10px;
  align-items: center;
}
.panel {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 16px;
  text-align: center;
}
.panel .label { font-size: 10px; color: #888; text-transform: uppercase; }
.panel .value { font-size: 20px; font-weight: 700; color: #f7dc6f; font-variant-numeric: tabular-nums; }
canvas { border-radius: 8px; display: block; cursor: pointer; }
.footer { margin-top: 12px; font-size: 14px; }
.footer a { color: #f7dc6f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Doodle Jump</h1>
<div class="info">
  <div class="panel"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="panel"><div class="label">Best</div><div class="value" id="best">0</div></div>
</div>
<canvas id="canvas"></canvas>
<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

const W = Math.min(400, window.innerWidth - 30);
const H = Math.min(600, window.innerHeight - 150);
canvas.width = W; canvas.height = H;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';

let best = +localStorage.getItem('doodle_best') || 0;
bestEl.textContent = best;

// constants
const GRAVITY = 0.4;
const JUMP_VEL = -10.5;
const MOVE_SPEED = 5;
const PLAT_W = 65;
const PLAT_H = 12;
const PLAYER_W = 30;
const PLAYER_H = 36;
const PLAT_COUNT = 8;

let player, platforms, score, maxHeight, state, keys;

function init() {
  keys = {};
  score = 0;
  maxHeight = 0;
  state = 'ready'; // ready, play, dead
  scoreEl.textContent = '0';

  player = {
    x: W / 2 - PLAYER_W / 2,
    y: H - 80,
    vy: JUMP_VEL,
    facing: 1 // 1=right, -1=left
  };

  // generate initial platforms
  platforms = [];
  // guaranteed starting platform under player
  platforms.push({ x: player.x - 15, y: H - 40, w: PLAT_W, type: 'normal' });
  for (let i = 1; i < PLAT_COUNT; i++) {
    platforms.push(makePlatform(H - 40 - i * (H / PLAT_COUNT)));
  }
}

function makePlatform(y) {
  const type = Math.random() < 0.15 && score > 500 ? 'breaking' :
               Math.random() < 0.1 && score > 300 ? 'moving' : 'normal';
  const p = {
    x: Math.random() * (W - PLAT_W),
    y: y,
    w: PLAT_W,
    type: type,
    moveDir: Math.random() > 0.5 ? 1 : -1,
    broken: false,
    breakTimer: 0
  };
  return p;
}

// --- Input ---
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
  if (state === 'ready') state = 'play';
  if (state === 'dead' && e.key === ' ') init();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// touch tilt / buttons
let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
  if (state === 'ready') state = 'play';
  if (state === 'dead') init();
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
}, {passive: false});
canvas.addEventListener('touchend', () => { touchX = null; });
canvas.addEventListener('click', () => {
  if (state === 'ready') state = 'play';
  if (state === 'dead') init();
});

function update() {
  if (state !== 'play') return;

  // horizontal movement
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['a']) moveX = -MOVE_SPEED;
  if (keys['ArrowRight'] || keys['d']) moveX = MOVE_SPEED;
  if (touchX !== null) {
    const rect = canvas.getBoundingClientRect();
    const mid = rect.left + rect.width / 2;
    moveX = (touchX - mid) / rect.width * MOVE_SPEED * 4;
    moveX = Math.max(-MOVE_SPEED, Math.min(MOVE_SPEED, moveX));
  }
  player.x += moveX;
  if (moveX > 0.5) player.facing = 1;
  if (moveX < -0.5) player.facing = -1;

  // wrap around
  if (player.x + PLAYER_W < 0) player.x = W;
  if (player.x > W) player.x = -PLAYER_W;

  // gravity
  player.vy += GRAVITY;
  player.y += player.vy;

  // platform collision (only when falling)
  if (player.vy > 0) {
    for (const p of platforms) {
      if (p.broken) continue;
      const px = player.x + PLAYER_W / 2;
      const py = player.y + PLAYER_H;
      const prevPy = py - player.vy;
      if (px > p.x && px < p.x + p.w &&
          py >= p.y && prevPy <= p.y + PLAT_H) {
        if (p.type === 'breaking') {
          p.broken = true;
          p.breakTimer = 10;
        } else {
          player.vy = JUMP_VEL;
          player.y = p.y - PLAYER_H;
        }
      }
    }
  }

  // move moving platforms
  for (const p of platforms) {
    if (p.type === 'moving' && !p.broken) {
      p.x += p.moveDir * 1.5;
      if (p.x <= 0 || p.x + p.w >= W) p.moveDir *= -1;
    }
    if (p.broken && p.breakTimer > 0) p.breakTimer--;
  }

  // scroll camera when player is above mid
  const scrollLine = H * 0.38;
  if (player.y < scrollLine) {
    const shift = scrollLine - player.y;
    player.y = scrollLine;
    maxHeight += shift;
    score = Math.floor(maxHeight / 10);
    scoreEl.textContent = score;

    for (const p of platforms) p.y += shift;

    // remove offscreen, add new
    for (let i = platforms.length - 1; i >= 0; i--) {
      if (platforms[i].y > H + 20) platforms.splice(i, 1);
    }
    while (platforms.length < PLAT_COUNT) {
      const topY = Math.min(...platforms.map(p => p.y));
      const gap = H / PLAT_COUNT;
      // ensure reachable: max gap ~140px
      const newY = topY - (gap * 0.7 + Math.random() * gap * 0.6);
      platforms.push(makePlatform(newY));
    }
  }

  // dead: fell below screen
  if (player.y > H + 50) {
    state = 'dead';
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('doodle_best', best);
    }
  }
}

// --- Drawing ---
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridOff = (maxHeight * 0.5) % 40;
  for (let y = gridOff; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPlatform(p) {
  if (p.broken && p.breakTimer <= 0) return;

  ctx.save();
  if (p.broken) ctx.globalAlpha = p.breakTimer / 10;

  if (p.type === 'normal') {
    ctx.fillStyle = '#27ae60';
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w, PLAT_H, 4);
    ctx.fill();
    // highlight
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(p.x + 3, p.y + 2, p.w - 6, 3);
  } else if (p.type === 'moving') {
    ctx.fillStyle = '#3498db';
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w, PLAT_H, 4);
    ctx.fill();
    ctx.fillStyle = '#5dade2';
    ctx.fillRect(p.x + 3, p.y + 2, p.w - 6, 3);
    // arrows
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.moveDir > 0 ? '>>>' : '<<<', p.x + p.w / 2, p.y + 10);
  } else if (p.type === 'breaking') {
    ctx.fillStyle = '#e67e22';
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w, PLAT_H, 4);
    ctx.fill();
    // cracks
    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x + 15, p.y + 2);
    ctx.lineTo(p.x + 20, p.y + PLAT_H - 2);
    ctx.moveTo(p.x + p.w - 18, p.y + 3);
    ctx.lineTo(p.x + p.w - 22, p.y + PLAT_H - 1);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer() {
  const x = player.x, y = player.y;
  const cx = x + PLAYER_W / 2;
  const f = player.facing;

  ctx.save();

  // body
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.ellipse(cx, y + 16, 13, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // belly
  ctx.fillStyle = '#f9e784';
  ctx.beginPath();
  ctx.ellipse(cx, y + 18, 8, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // eyes
  const eyeOff = f * 4;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(cx - 4 + eyeOff, y + 10, 5, 5.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 5 + eyeOff, y + 10, 5, 5.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // pupils
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(cx - 3 + eyeOff + f * 2, y + 10, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 6 + eyeOff + f * 2, y + 10, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // mouth
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx + f * 3, y + 18, 4, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // legs (spring effect when jumping up)
  const legStretch = player.vy < 0 ? 4 : 0;
  ctx.fillStyle = '#f1c40f';
  ctx.fillRect(cx - 10, y + 28 + legStretch, 7, 8 - legStretch);
  ctx.fillRect(cx + 3, y + 28 + legStretch, 7, 8 - legStretch);

  // feet
  ctx.fillStyle = '#e67e22';
  ctx.fillRect(cx - 12, y + PLAYER_H - 2 + legStretch, 10, 4);
  ctx.fillRect(cx + 2, y + PLAYER_H - 2 + legStretch, 10, 4);

  ctx.restore();
}

function drawOverlay() {
  if (state === 'ready') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f7dc6f';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Click or Press Any Key', W / 2, H / 2 + 40);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px sans-serif';
    ctx.fillText('Arrow keys / Touch to move', W / 2, H / 2 + 65);
  }

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', W / 2, H / 2 - 15);
    ctx.fillStyle = '#f7dc6f';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 20);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px sans-serif';
    ctx.fillText('Click to restart', W / 2, H / 2 + 50);
  }
}

function render() {
  drawBg();
  for (const p of platforms) drawPlatform(p);
  drawPlayer();

  // score on canvas
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(score + 'm', 12, 28);

  drawOverlay();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>
