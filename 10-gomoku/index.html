<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Five in a Row</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
}
h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #eee, #aaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.info {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 10px;
  font-size: 16px;
}
.status {
  background: #16213e;
  border-radius: 8px;
  padding: 8px 20px;
  min-width: 180px;
  text-align: center;
}
.btn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a1a40; }
canvas {
  border-radius: 8px;
  cursor: pointer;
  display: block;
}
.footer {
  margin-top: 15px;
  font-size: 14px;
}
.footer a {
  color: #f7dc6f;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Five in a Row</h1>
<div class="info">
  <div class="status" id="status">Black (You)</div>
  <button class="btn" onclick="init()">New Game</button>
  <button class="btn" id="undoBtn" onclick="undo()">Undo</button>
</div>
<canvas id="canvas"></canvas>
<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
const N = 15;
const PAD = 30;
let cellSize, canvasSize;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

// 1=black(player), 2=white(AI), 0=empty
let board, history, gameOver, turn;

function resize() {
  const maxW = Math.min(window.innerWidth - 30, 560);
  cellSize = Math.floor((maxW - PAD * 2) / (N - 1));
  canvasSize = cellSize * (N - 1) + PAD * 2;
  canvas.width = canvas.height = canvasSize;
  canvas.style.width = canvas.style.height = canvasSize + 'px';
  draw();
}

function init() {
  board = Array.from({length: N}, () => Array(N).fill(0));
  history = [];
  gameOver = false;
  turn = 1;
  statusEl.textContent = 'Black (You)';
  statusEl.style.color = '#eee';
  resize();
}

function draw() {
  const w = canvasSize;
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, w, w);

  // grid
  ctx.strokeStyle = '#334';
  ctx.lineWidth = 1;
  for (let i = 0; i < N; i++) {
    const p = PAD + i * cellSize;
    ctx.beginPath(); ctx.moveTo(PAD, p); ctx.lineTo(w - PAD, p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p, PAD); ctx.lineTo(p, w - PAD); ctx.stroke();
  }

  // star points
  ctx.fillStyle = '#556';
  const stars = [3, 7, 11];
  for (const r of stars) for (const c of stars) {
    ctx.beginPath();
    ctx.arc(PAD + c * cellSize, PAD + r * cellSize, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // stones
  const r = cellSize * 0.43;
  for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
    if (!board[i][j]) continue;
    const x = PAD + j * cellSize, y = PAD + i * cellSize;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    if (board[i][j] === 1) {
      const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
      g.addColorStop(0, '#555');
      g.addColorStop(1, '#111');
      ctx.fillStyle = g;
    } else {
      const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
      g.addColorStop(0, '#fff');
      g.addColorStop(1, '#bbb');
      ctx.fillStyle = g;
    }
    ctx.fill();
    ctx.strokeStyle = board[i][j] === 1 ? '#000' : '#999';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // last move marker
  if (history.length) {
    const last = history[history.length - 1];
    const x = PAD + last.c * cellSize, y = PAD + last.r * cellSize;
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// click handler
canvas.addEventListener('click', e => {
  if (gameOver || turn !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scale = canvasSize / rect.width;
  const mx = (e.clientX - rect.left) * scale;
  const my = (e.clientY - rect.top) * scale;
  const col = Math.round((mx - PAD) / cellSize);
  const row = Math.round((my - PAD) / cellSize);
  if (row < 0 || row >= N || col < 0 || col >= N) return;
  if (board[row][col]) return;
  place(row, col, 1);
  if (gameOver) return;
  turn = 2;
  statusEl.textContent = 'AI Thinking...';
  setTimeout(() => {
    aiMove();
    turn = 1;
    if (!gameOver) statusEl.textContent = 'Black (You)';
  }, 50);
});

function place(r, c, who) {
  board[r][c] = who;
  history.push({r, c, who});
  draw();
  if (checkWin(r, c, who)) {
    gameOver = true;
    const name = who === 1 ? 'Black Wins!' : 'White Wins!';
    statusEl.textContent = name;
    statusEl.style.color = '#f7dc6f';
    highlightWin(r, c, who);
  } else if (history.length === N * N) {
    gameOver = true;
    statusEl.textContent = 'Draw!';
    statusEl.style.color = '#f7dc6f';
  }
}

function undo() {
  if (gameOver || history.length < 2) return;
  // undo AI + player
  for (let i = 0; i < 2; i++) {
    const m = history.pop();
    board[m.r][m.c] = 0;
  }
  turn = 1;
  statusEl.textContent = 'Black (You)';
  draw();
}

// --- Win check ---
const DIRS = [[0,1],[1,0],[1,1],[1,-1]];
function countDir(r, c, dr, dc, who) {
  let n = 0;
  for (let i = 1; i < 5; i++) {
    const nr = r + dr * i, nc = c + dc * i;
    if (nr < 0 || nr >= N || nc < 0 || nc >= N || board[nr][nc] !== who) break;
    n++;
  }
  return n;
}
function checkWin(r, c, who) {
  for (const [dr, dc] of DIRS) {
    if (1 + countDir(r, c, dr, dc, who) + countDir(r, c, -dr, -dc, who) >= 5) return true;
  }
  return false;
}
function highlightWin(r, c, who) {
  for (const [dr, dc] of DIRS) {
    const a = countDir(r, c, dr, dc, who);
    const b = countDir(r, c, -dr, -dc, who);
    if (1 + a + b >= 5) {
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(PAD + (c - dc * b) * cellSize, PAD + (r - dr * b) * cellSize);
      ctx.lineTo(PAD + (c + dc * a) * cellSize, PAD + (r + dr * a) * cellSize);
      ctx.stroke();
      return;
    }
  }
}

// --- AI ---
function aiMove() {
  // Score every empty cell for both sides, pick the best
  let bestScore = -1, bestR = -1, bestC = -1;
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (board[r][c]) continue;
    // only consider cells near existing stones
    if (!hasNeighbor(r, c, 2)) continue;
    const s = evalCell(r, c);
    if (s > bestScore) { bestScore = s; bestR = r; bestC = c; }
  }
  if (bestR === -1) {
    // fallback: center or first empty
    if (!board[7][7]) { bestR = 7; bestC = 7; }
    else {
      outer: for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
        if (!board[r][c]) { bestR = r; bestC = c; break outer; }
      }
    }
  }
  place(bestR, bestC, 2);
}

function hasNeighbor(r, c, dist) {
  for (let dr = -dist; dr <= dist; dr++)
    for (let dc = -dist; dc <= dist; dc++) {
      if (!dr && !dc) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < N && nc >= 0 && nc < N && board[nr][nc]) return true;
    }
  return false;
}

function evalCell(r, c) {
  // evaluate for AI (white=2) and player (black=1)
  const aiScore = evalFor(r, c, 2);
  const plScore = evalFor(r, c, 1);
  return aiScore + plScore * 0.95; // slightly prefer own attack
}

function evalFor(r, c, who) {
  let total = 0;
  for (const [dr, dc] of DIRS) {
    const info = lineInfo(r, c, dr, dc, who);
    total += patternScore(info);
  }
  return total;
}

// Analyze a line through (r,c) in direction (dr,dc) for `who`
function lineInfo(r, c, dr, dc, who) {
  const opp = who === 1 ? 2 : 1;
  let count = 1; // the cell itself
  let open = 0;  // open ends (0, 1, or 2)

  // positive direction
  let i = 1;
  while (i < 5) {
    const nr = r + dr * i, nc = c + dc * i;
    if (nr < 0 || nr >= N || nc < 0 || nc >= N) break;
    if (board[nr][nc] === who) { count++; i++; }
    else if (board[nr][nc] === 0) { open++; break; }
    else break; // opponent
  }
  // negative direction
  i = 1;
  while (i < 5) {
    const nr = r - dr * i, nc = c - dc * i;
    if (nr < 0 || nr >= N || nc < 0 || nc >= N) break;
    if (board[nr][nc] === who) { count++; i++; }
    else if (board[nr][nc] === 0) { open++; break; }
    else break;
  }
  return { count, open };
}

function patternScore({ count, open }) {
  if (count >= 5) return 1000000;
  if (open === 0) return 0; // blocked both sides, useless
  // live patterns (open=2) vs half-open (open=1)
  if (count === 4) return open === 2 ? 100000 : 50000;
  if (count === 3) return open === 2 ? 10000  : 1000;
  if (count === 2) return open === 2 ? 500    : 100;
  if (count === 1) return open === 2 ? 30     : 10;
  return 0;
}

window.addEventListener('resize', resize);
init();
</script>
</body>
</html>
