<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minesweeper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
}
h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #e74c3c, #f39c12, #2ecc71);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
}
.btn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a1a40; }
.btn.active { border-color: #f7dc6f; color: #f7dc6f; }
.stats {
  display: flex;
  gap: 15px;
  margin-bottom: 10px;
  align-items: center;
}
.panel {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 16px;
  text-align: center;
  min-width: 70px;
}
.panel .label { font-size: 10px; color: #888; text-transform: uppercase; }
.panel .value { font-size: 20px; font-weight: 700; color: #f7dc6f; font-variant-numeric: tabular-nums; }
.face {
  font-size: 28px;
  cursor: pointer;
  background: #16213e;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 4px 12px;
  line-height: 1;
}
.board-wrap {
  overflow-x: auto;
  max-width: 100vw;
  padding-bottom: 5px;
}
.board {
  display: inline-grid;
  gap: 2px;
  background: #0f0f23;
  border-radius: 8px;
  padding: 6px;
  user-select: none;
  -webkit-user-select: none;
}
.cell {
  width: var(--cell);
  height: var(--cell);
  background: #2c3e50;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: var(--font);
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.cell:hover { background: #34495e; }
.cell.revealed {
  background: #16213e;
  cursor: default;
}
.cell.revealed:hover { background: #16213e; }
.cell.mine-hit { background: #c0392b; }
.cell.mine-show { background: #1a1a35; }
.cell.flagged::after { content: '\1F6A9'; font-size: calc(var(--font) + 2px); }
.n1 { color: #3498db; } .n2 { color: #27ae60; }
.n3 { color: #e74c3c; } .n4 { color: #8e44ad; }
.n5 { color: #e67e22; } .n6 { color: #1abc9c; }
.n7 { color: #2c3e50; } .n8 { color: #95a5a6; }
.mobile-toggle {
  display: none;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}
.mobile-toggle .btn { padding: 8px 18px; font-size: 15px; }
@media (pointer: coarse) { .mobile-toggle { display: flex; } }
.footer { margin-top: 12px; font-size: 14px; }
.footer a { color: #f7dc6f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Minesweeper</h1>

<div class="toolbar">
  <button class="btn active" data-diff="easy" onclick="setDiff('easy')">Easy 9x9</button>
  <button class="btn" data-diff="medium" onclick="setDiff('medium')">Medium 16x16</button>
  <button class="btn" data-diff="hard" onclick="setDiff('hard')">Hard 30x16</button>
</div>

<div class="stats">
  <div class="panel"><div class="label">Mines</div><div class="value" id="mineCount">10</div></div>
  <div class="face" id="face" onclick="newGame()">&#x1F60A;</div>
  <div class="panel"><div class="label">Time</div><div class="value" id="timer">0</div></div>
</div>

<div class="mobile-toggle" id="mobileToggle">
  <button class="btn active" id="modeReveal" onclick="setMode('reveal')">Reveal</button>
  <button class="btn" id="modeFlag" onclick="setMode('flag')">Flag</button>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
const DIFFS = {
  easy:   { rows: 9,  cols: 9,  mines: 10, cell: 36, font: 16 },
  medium: { rows: 16, cols: 16, mines: 40, cell: 30, font: 14 },
  hard:   { rows: 16, cols: 30, mines: 99, cell: 28, font: 13 },
};

const boardEl = document.getElementById('board');
const faceEl = document.getElementById('face');
const mineCountEl = document.getElementById('mineCount');
const timerEl = document.getElementById('timer');

let diff, rows, cols, totalMines;
let grid, revealed, flagged, mineMap;
let gameState, firstClick, flagCount, elapsed, timerInterval;
let mobileMode = 'reveal'; // for touch devices

function setDiff(d) {
  diff = d;
  document.querySelectorAll('.toolbar .btn').forEach(b => b.classList.toggle('active', b.dataset.diff === d));
  newGame();
}

function setMode(m) {
  mobileMode = m;
  document.getElementById('modeReveal').classList.toggle('active', m === 'reveal');
  document.getElementById('modeFlag').classList.toggle('active', m === 'flag');
}

function newGame() {
  const d = DIFFS[diff];
  rows = d.rows; cols = d.cols; totalMines = d.mines;
  grid = Array.from({length: rows}, () => Array(cols).fill(0)); // number counts
  revealed = Array.from({length: rows}, () => Array(cols).fill(false));
  flagged = Array.from({length: rows}, () => Array(cols).fill(false));
  mineMap = Array.from({length: rows}, () => Array(cols).fill(false));
  gameState = 'waiting'; // waiting, playing, won, lost
  firstClick = true;
  flagCount = 0;
  elapsed = 0;
  clearInterval(timerInterval);
  timerEl.textContent = '0';
  mineCountEl.textContent = totalMines;
  faceEl.innerHTML = '&#x1F60A;';
  buildBoard(d);
}

function buildBoard(d) {
  boardEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell))`;
  boardEl.style.setProperty('--cell', d.cell + 'px');
  boardEl.style.setProperty('--font', d.font + 'px');
  boardEl.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', e => onLeftClick(r, c));
      cell.addEventListener('contextmenu', e => { e.preventDefault(); onRightClick(r, c); });
      // long press for flag on mobile
      let longTimer;
      cell.addEventListener('touchstart', e => {
        longTimer = setTimeout(() => { longTimer = -1; onRightClick(r, c); }, 400);
      }, {passive: true});
      cell.addEventListener('touchend', e => {
        if (longTimer === -1) { e.preventDefault(); }
        else { clearTimeout(longTimer); }
      });
      cell.addEventListener('touchmove', () => clearTimeout(longTimer));
      boardEl.appendChild(cell);
    }
  }
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < totalMines) {
    const r = Math.random() * rows | 0;
    const c = Math.random() * cols | 0;
    if (mineMap[r][c]) continue;
    if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
    mineMap[r][c] = true;
    placed++;
  }
  // count neighbors
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (mineMap[r][c]) { grid[r][c] = -1; continue; }
      let n = 0;
      forNeighbors(r, c, (nr, nc) => { if (mineMap[nr][nc]) n++; });
      grid[r][c] = n;
    }
  }
}

function forNeighbors(r, c, cb) {
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) cb(nr, nc);
    }
}

function onLeftClick(r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  if (flagged[r][c]) return;

  // mobile flag mode
  if (mobileMode === 'flag' && 'ontouchstart' in window) {
    onRightClick(r, c);
    return;
  }

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    gameState = 'playing';
    timerInterval = setInterval(() => {
      elapsed++;
      timerEl.textContent = elapsed;
    }, 1000);
  }

  if (revealed[r][c]) {
    // chord: if flagged neighbors == number, reveal rest
    if (grid[r][c] > 0) {
      let fc = 0;
      forNeighbors(r, c, (nr, nc) => { if (flagged[nr][nc]) fc++; });
      if (fc === grid[r][c]) {
        forNeighbors(r, c, (nr, nc) => {
          if (!revealed[nr][nc] && !flagged[nr][nc]) revealCell(nr, nc);
        });
      }
    }
    return;
  }

  revealCell(r, c);
}

function revealCell(r, c) {
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;

  if (mineMap[r][c]) {
    gameState = 'lost';
    clearInterval(timerInterval);
    faceEl.innerHTML = '&#x1F635;';
    revealAllMines(r, c);
    return;
  }

  updateCellDOM(r, c);

  // flood fill for empty cells
  if (grid[r][c] === 0) {
    forNeighbors(r, c, (nr, nc) => revealCell(nr, nc));
  }

  checkWin();
}

function onRightClick(r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  if (revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  mineCountEl.textContent = totalMines - flagCount;
  updateCellDOM(r, c);
}

function updateCellDOM(r, c) {
  const cell = boardEl.children[r * cols + c];
  cell.className = 'cell';
  if (revealed[r][c]) {
    cell.classList.add('revealed');
    const v = grid[r][c];
    if (v > 0) {
      cell.textContent = v;
      cell.classList.add('n' + v);
    } else {
      cell.textContent = '';
    }
  } else if (flagged[r][c]) {
    cell.classList.add('flagged');
    cell.textContent = '';
  } else {
    cell.textContent = '';
  }
}

function revealAllMines(hitR, hitC) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = boardEl.children[r * cols + c];
      if (mineMap[r][c]) {
        if (r === hitR && c === hitC) {
          cell.className = 'cell revealed mine-hit';
          cell.textContent = '\u{1F4A3}';
        } else if (!flagged[r][c]) {
          cell.className = 'cell revealed mine-show';
          cell.textContent = '\u{1F4A3}';
        }
      } else if (flagged[r][c]) {
        // wrong flag
        cell.className = 'cell revealed';
        cell.textContent = '\u274C';
      }
    }
  }
}

function checkWin() {
  let unrevealed = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealed[r][c]) unrevealed++;
  if (unrevealed === totalMines) {
    gameState = 'won';
    clearInterval(timerInterval);
    faceEl.innerHTML = '&#x1F60E;';
    // auto-flag remaining
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (!revealed[r][c] && !flagged[r][c]) {
          flagged[r][c] = true;
          updateCellDOM(r, c);
        }
    mineCountEl.textContent = '0';
  }
}

setDiff('easy');
</script>
</body>
</html>
