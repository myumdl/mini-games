<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tetris</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  overflow-x: hidden;
}
h1 {
  font-size: 40px;
  font-weight: 800;
  background: linear-gradient(135deg, #e74c3c, #f39c12, #2ecc71, #3498db);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.game-wrap {
  display: flex;
  gap: 15px;
  align-items: flex-start;
}
.side {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.panel {
  background: #16213e;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.panel .label {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.panel .value {
  font-size: 22px;
  font-weight: 700;
  color: #f7dc6f;
}
canvas { border-radius: 8px; display: block; }
#previewCanvas { margin: 0 auto; }
.btn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
  width: 100%;
}
.btn:hover { background: #1a1a40; }
.controls {
  display: none;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 10px;
}
.controls .cbtn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 14px 0;
  font-size: 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.controls .cbtn:active { background: #0f3460; }
.controls .wide { grid-column: span 3; }
@media (max-width: 500px) {
  .controls { display: grid; }
}
.footer { margin-top: 12px; font-size: 14px; }
.footer a { color: #f7dc6f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.65);
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}
.overlay.show { display: flex; }
.overlay span {
  font-size: 28px;
  font-weight: 700;
  color: #f7dc6f;
}
.board-wrap { position: relative; }
</style>
</head>
<body>

<h1>Tetris</h1>

<div class="game-wrap">
  <div class="board-wrap">
    <canvas id="board"></canvas>
    <div class="overlay" id="overlay"><span id="overlayText">Game Over</span></div>
  </div>
  <div class="side">
    <div class="panel">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel">
      <div class="label">Lines</div>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel">
      <div class="label">Level</div>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel">
      <div class="label">Next</div>
      <canvas id="previewCanvas"></canvas>
    </div>
    <button class="btn" onclick="startGame()">New Game</button>
    <button class="btn" id="pauseBtn" onclick="togglePause()">Pause</button>
  </div>
</div>

<div class="controls" id="mobileControls">
  <div></div>
  <button class="cbtn" ontouchstart="handleKey('ArrowUp')">&#x21BB;</button>
  <div></div>
  <button class="cbtn" ontouchstart="handleKey('ArrowLeft')">&#x25C0;</button>
  <button class="cbtn" ontouchstart="handleKey('ArrowDown')">&#x25BC;</button>
  <button class="cbtn" ontouchstart="handleKey('ArrowRight')">&#x25B6;</button>
  <button class="cbtn wide" ontouchstart="handleKey(' ')">Drop</button>
</div>

<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
// --- Constants ---
const COLS = 10, ROWS = 20;
const CELL = Math.min(Math.floor((window.innerWidth - 140) / COLS), 28);
const boardCanvas = document.getElementById('board');
const bCtx = boardCanvas.getContext('2d');
boardCanvas.width = COLS * CELL;
boardCanvas.height = ROWS * CELL;

const prevCanvas = document.getElementById('previewCanvas');
const pCtx = prevCanvas.getContext('2d');
prevCanvas.width = 4 * CELL;
prevCanvas.height = 4 * CELL;

const scoreEl = document.getElementById('score');
const linesEl = document.getElementById('lines');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');
const overlayText = document.getElementById('overlayText');

// 7 tetrominoes: I, O, T, S, Z, J, L
const SHAPES = [
  { blocks: [[0,0],[0,1],[0,2],[0,3]], color: '#00bcd4' },  // I
  { blocks: [[0,0],[0,1],[1,0],[1,1]], color: '#f7dc6f' },  // O
  { blocks: [[0,1],[1,0],[1,1],[1,2]], color: '#9b59b6' },  // T
  { blocks: [[0,1],[0,2],[1,0],[1,1]], color: '#2ecc71' },  // S
  { blocks: [[0,0],[0,1],[1,1],[1,2]], color: '#e74c3c' },  // Z
  { blocks: [[0,0],[1,0],[1,1],[1,2]], color: '#3498db' },  // J
  { blocks: [[0,2],[1,0],[1,1],[1,2]], color: '#e67e22' },  // L
];

let grid, current, next, score, totalLines, level;
let dropInterval, timer, paused, running;

function startGame() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  score = 0; totalLines = 0; level = 1; paused = false; running = true;
  scoreEl.textContent = 0; linesEl.textContent = 0; levelEl.textContent = 1;
  overlay.classList.remove('show');
  next = randomPiece();
  spawnPiece();
  clearInterval(timer);
  dropInterval = 800;
  timer = setInterval(tick, dropInterval);
}

function randomPiece() {
  const s = SHAPES[Math.random() * 7 | 0];
  return { blocks: s.blocks.map(b => [...b]), color: s.color };
}

function spawnPiece() {
  current = { ...next, x: 3, y: 0 };
  next = randomPiece();
  drawPreview();
  if (!canPlace(current.blocks, current.x, current.y)) {
    running = false;
    clearInterval(timer);
    overlayText.textContent = 'Game Over';
    overlay.classList.add('show');
  }
}

function canPlace(blocks, ox, oy) {
  for (const [r, c] of blocks) {
    const nr = r + oy, nc = c + ox;
    if (nc < 0 || nc >= COLS || nr >= ROWS) return false;
    if (nr >= 0 && grid[nr][nc]) return false;
  }
  return true;
}

function lock() {
  for (const [r, c] of current.blocks) {
    const nr = r + current.y, nc = c + current.x;
    if (nr >= 0) grid[nr][nc] = current.color;
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(c => c)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(0));
      cleared++;
      r++; // recheck row
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 800) * level;
    totalLines += cleared;
    level = Math.floor(totalLines / 10) + 1;
    scoreEl.textContent = score;
    linesEl.textContent = totalLines;
    levelEl.textContent = level;
    // speed up
    clearInterval(timer);
    dropInterval = Math.max(100, 800 - (level - 1) * 60);
    timer = setInterval(tick, dropInterval);
  }
}

function rotate(blocks) {
  // rotate 90 CW around bounding box center
  const maxR = Math.max(...blocks.map(b => b[0]));
  const maxC = Math.max(...blocks.map(b => b[1]));
  return blocks.map(([r, c]) => [c, maxR - r]);
}

function tick() {
  if (!running || paused) return;
  if (canPlace(current.blocks, current.x, current.y + 1)) {
    current.y++;
  } else {
    lock();
  }
  draw();
}

function handleKey(key) {
  if (!running) return;
  if (key === 'ArrowLeft') {
    if (canPlace(current.blocks, current.x - 1, current.y)) current.x--;
  } else if (key === 'ArrowRight') {
    if (canPlace(current.blocks, current.x + 1, current.y)) current.x++;
  } else if (key === 'ArrowDown') {
    if (canPlace(current.blocks, current.x, current.y + 1)) {
      current.y++;
      score += 1;
      scoreEl.textContent = score;
    }
  } else if (key === 'ArrowUp') {
    const rotated = rotate(current.blocks);
    // wall kicks: try 0, -1, +1, -2, +2
    for (const dx of [0, -1, 1, -2, 2]) {
      if (canPlace(rotated, current.x + dx, current.y)) {
        current.blocks = rotated;
        current.x += dx;
        break;
      }
    }
  } else if (key === ' ') {
    // hard drop
    while (canPlace(current.blocks, current.x, current.y + 1)) {
      current.y++;
      score += 2;
    }
    scoreEl.textContent = score;
    lock();
  }
  draw();
}

document.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
    e.preventDefault();
    handleKey(e.key);
  }
});

function togglePause() {
  if (!running) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
  if (paused) {
    overlayText.textContent = 'Paused';
    overlay.classList.add('show');
  } else {
    overlay.classList.remove('show');
  }
}

// --- Drawing ---
function drawCell(ctx, x, y, color, size) {
  ctx.fillStyle = color;
  ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(x + 1, y + 1, size - 2, 3);
  ctx.fillRect(x + 1, y + 1, 3, size - 2);
}

function draw() {
  const w = boardCanvas.width, h = boardCanvas.height;
  bCtx.fillStyle = '#0a0a1a';
  bCtx.fillRect(0, 0, w, h);

  // grid lines
  bCtx.strokeStyle = '#1a1a30';
  bCtx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    bCtx.beginPath(); bCtx.moveTo(0, r * CELL); bCtx.lineTo(w, r * CELL); bCtx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    bCtx.beginPath(); bCtx.moveTo(c * CELL, 0); bCtx.lineTo(c * CELL, h); bCtx.stroke();
  }

  // locked cells
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]) drawCell(bCtx, c * CELL, r * CELL, grid[r][c], CELL);

  if (!running) return;

  // ghost piece
  let ghostY = current.y;
  while (canPlace(current.blocks, current.x, ghostY + 1)) ghostY++;
  if (ghostY !== current.y) {
    for (const [r, c] of current.blocks) {
      const px = (c + current.x) * CELL, py = (r + ghostY) * CELL;
      bCtx.strokeStyle = current.color;
      bCtx.globalAlpha = 0.25;
      bCtx.strokeRect(px + 2, py + 2, CELL - 4, CELL - 4);
      bCtx.globalAlpha = 1;
    }
  }

  // current piece
  for (const [r, c] of current.blocks) {
    const py = r + current.y;
    if (py < 0) continue;
    drawCell(bCtx, (c + current.x) * CELL, py * CELL, current.color, CELL);
  }
}

function drawPreview() {
  const s = CELL;
  pCtx.fillStyle = '#16213e';
  pCtx.fillRect(0, 0, prevCanvas.width, prevCanvas.height);
  // center the piece
  const minR = Math.min(...next.blocks.map(b => b[0]));
  const maxR = Math.max(...next.blocks.map(b => b[0]));
  const minC = Math.min(...next.blocks.map(b => b[1]));
  const maxC = Math.max(...next.blocks.map(b => b[1]));
  const pw = maxC - minC + 1, ph = maxR - minR + 1;
  const ox = Math.floor((4 - pw) / 2) - minC;
  const oy = Math.floor((4 - ph) / 2) - minR;
  for (const [r, c] of next.blocks) {
    drawCell(pCtx, (c + ox) * s, (r + oy) * s, next.color, s);
  }
}

startGame();
</script>
</body>
</html>
