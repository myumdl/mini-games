<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  overflow: hidden;
}
h1 {
  font-size: 40px;
  font-weight: 800;
  background: linear-gradient(135deg, #2ecc71, #27ae60);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.info {
  display: flex;
  gap: 15px;
  margin-bottom: 10px;
}
.panel {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 18px;
  text-align: center;
}
.panel .label { font-size: 11px; color: #888; text-transform: uppercase; }
.panel .value { font-size: 22px; font-weight: 700; color: #f7dc6f; }
.btn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a1a40; }
canvas { border-radius: 8px; display: block; }
.controls {
  display: none;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 10px;
}
.controls .cbtn {
  background: #16213e;
  color: #eee;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 14px 0;
  font-size: 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.controls .cbtn:active { background: #0f3460; }
@media (max-width: 500px) { .controls { display: grid; } }
.footer { margin-top: 12px; font-size: 14px; }
.footer a { color: #f7dc6f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Snake</h1>
<div class="info">
  <div class="panel"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="panel"><div class="label">Best</div><div class="value" id="best">0</div></div>
  <button class="btn" onclick="startGame()">New Game</button>
</div>
<canvas id="canvas"></canvas>

<div class="controls" id="mobileControls">
  <div></div>
  <button class="cbtn" ontouchstart="setDir(0,-1)">&#x25B2;</button>
  <div></div>
  <button class="cbtn" ontouchstart="setDir(-1,0)">&#x25C0;</button>
  <button class="cbtn" ontouchstart="setDir(0,1)">&#x25BC;</button>
  <button class="cbtn" ontouchstart="setDir(1,0)">&#x25B6;</button>
</div>

<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

const COLS = 20, ROWS = 20;
const CELL = Math.min(Math.floor((Math.min(window.innerWidth, 500) - 30) / COLS), 24);
const W = COLS * CELL, H = ROWS * CELL;
canvas.width = W; canvas.height = H;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';

let best = +localStorage.getItem('snake_best') || 0;
bestEl.textContent = best;

let snake, dir, nextDir, food, score, state, timer, speed;

function startGame() {
  const midR = ROWS >> 1, midC = COLS >> 1;
  snake = [{x: midC, y: midR}, {x: midC - 1, y: midR}, {x: midC - 2, y: midR}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  speed = 140;
  state = 'play';
  scoreEl.textContent = 0;
  placeFood();
  clearInterval(timer);
  timer = setInterval(tick, speed);
  draw();
}

function placeFood() {
  const occupied = new Set(snake.map(s => s.x + ',' + s.y));
  let fx, fy;
  do {
    fx = Math.random() * COLS | 0;
    fy = Math.random() * ROWS | 0;
  } while (occupied.has(fx + ',' + fy));
  food = {x: fx, y: fy};
}

function setDir(dx, dy) {
  // prevent 180 turn
  if (dir.x === -dx && dir.y === -dy) return;
  nextDir = {x: dx, y: dy};
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: [0, -1], ArrowDown: [0, 1],
    ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0]
  };
  const d = map[e.key];
  if (d) { e.preventDefault(); setDir(d[0], d[1]); }
});

// swipe support
let tx, ty;
canvas.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, {passive: true});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
});

function tick() {
  if (state !== 'play') return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die();
  // self collision
  for (const s of snake) if (s.x === head.x && s.y === head.y) return die();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    placeFood();
    // speed up
    if (speed > 60) {
      speed -= 3;
      clearInterval(timer);
      timer = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }
  draw();
}

function die() {
  state = 'dead';
  clearInterval(timer);
  if (score > best) {
    best = score;
    bestEl.textContent = best;
    localStorage.setItem('snake_best', best);
  }
  draw();
}

function draw() {
  // background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = '#141428';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke();
  }

  // food
  const fx = food.x * CELL + CELL / 2, fy = food.y * CELL + CELL / 2;
  ctx.fillStyle = '#e74c3c';
  ctx.shadowColor = '#e74c3c';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(fx, fy, CELL * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // snake
  for (let i = 0; i < snake.length; i++) {
    const s = snake[i];
    const t = 1 - i / snake.length * 0.5; // fade toward tail
    const r = Math.round(46 * t), g = Math.round(204 * t), b = Math.round(113 * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const pad = i === 0 ? 1 : 2;
    ctx.fillRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2);
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, 2);
  }

  // snake eyes
  if (snake.length) {
    const h = snake[0];
    const cx = h.x * CELL + CELL / 2, cy = h.y * CELL + CELL / 2;
    ctx.fillStyle = '#fff';
    const ed = 3;
    if (dir.x === 1) {
      ctx.fillRect(cx + 3, cy - ed - 1, 3, 3);
      ctx.fillRect(cx + 3, cy + ed - 1, 3, 3);
    } else if (dir.x === -1) {
      ctx.fillRect(cx - 6, cy - ed - 1, 3, 3);
      ctx.fillRect(cx - 6, cy + ed - 1, 3, 3);
    } else if (dir.y === -1) {
      ctx.fillRect(cx - ed - 1, cy - 6, 3, 3);
      ctx.fillRect(cx + ed - 1, cy - 6, 3, 3);
    } else {
      ctx.fillRect(cx - ed - 1, cy + 3, 3, 3);
      ctx.fillRect(cx + ed - 1, cy + 3, 3, 3);
    }
  }

  // overlays
  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', W / 2, H / 2 - 10);
    ctx.fillStyle = '#f7dc6f';
    ctx.font = '16px sans-serif';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 20);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px sans-serif';
    ctx.fillText('Click "New Game" to restart', W / 2, H / 2 + 48);
  }

  if (!state) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f7dc6f';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Click "New Game" to start', W / 2, H / 2);
  }
}

draw();
</script>
</body>
</html>
