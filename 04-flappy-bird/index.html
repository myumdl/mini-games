<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  overflow: hidden;
}
h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #2ecc71, #f1c40f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.info {
  display: flex;
  gap: 15px;
  margin-bottom: 10px;
}
.panel {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 18px;
  text-align: center;
}
.panel .label { font-size: 11px; color: #888; text-transform: uppercase; }
.panel .value { font-size: 22px; font-weight: 700; color: #f7dc6f; }
canvas { border-radius: 8px; display: block; cursor: pointer; }
.footer { margin-top: 12px; font-size: 14px; }
.footer a { color: #f7dc6f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Flappy Bird</h1>
<div class="info">
  <div class="panel"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="panel"><div class="label">Best</div><div class="value" id="best">0</div></div>
</div>
<canvas id="canvas"></canvas>
<div class="footer"><a href="../index.html">&larr; Back</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

// sizing
const W = Math.min(400, window.innerWidth - 30);
const H = Math.min(600, window.innerHeight - 160);
canvas.width = W; canvas.height = H;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';

let best = +localStorage.getItem('flappy_best') || 0;
bestEl.textContent = best;

// game state
const GRAVITY = 0.45;
const FLAP = -7;
const PIPE_W = 52;
const GAP = 140;
const PIPE_SPEED = 2.5;
const PIPE_INTERVAL = 90; // frames
const BIRD_R = 15;

let bird, pipes, score, frame, state; // state: 'idle' | 'play' | 'dead'

function reset() {
  bird = { x: W * 0.28, y: H * 0.45, vy: 0, angle: 0 };
  pipes = [];
  score = 0; frame = 0;
  state = 'idle';
  scoreEl.textContent = 0;
}

function flap() {
  if (state === 'dead') { reset(); return; }
  if (state === 'idle') state = 'play';
  bird.vy = FLAP;
}

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});

function addPipe() {
  const minTop = 60;
  const maxTop = H - GAP - 60;
  const topH = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W, topH, scored: false });
}

function update() {
  if (state !== 'play') return;
  frame++;

  // bird physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.angle = Math.min(bird.vy * 3, 70);

  // pipes
  if (frame % PIPE_INTERVAL === 0) addPipe();
  for (const p of pipes) {
    p.x -= PIPE_SPEED;
    // score
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      scoreEl.textContent = score;
    }
  }
  // remove offscreen
  if (pipes.length && pipes[0].x < -PIPE_W) pipes.shift();

  // collision
  // ground / ceiling
  if (bird.y + BIRD_R > H - 20 || bird.y - BIRD_R < 0) die();
  // pipes
  for (const p of pipes) {
    if (bird.x + BIRD_R > p.x && bird.x - BIRD_R < p.x + PIPE_W) {
      if (bird.y - BIRD_R < p.topH || bird.y + BIRD_R > p.topH + GAP) die();
    }
  }
}

function die() {
  state = 'dead';
  if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('flappy_best', best); }
}

function drawBird() {
  const { x, y, angle } = bird;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle * Math.PI / 180);

  // body
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_R + 2, BIRD_R, 0, 0, Math.PI * 2);
  ctx.fill();

  // wing
  ctx.fillStyle = '#e67e22';
  ctx.beginPath();
  ctx.ellipse(-4, 3, 10, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8, -5, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(10, -5, 3, 0, Math.PI * 2);
  ctx.fill();

  // beak
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(BIRD_R, -2);
  ctx.lineTo(BIRD_R + 10, 2);
  ctx.lineTo(BIRD_R, 6);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawPipe(p) {
  const capH = 20, capExtra = 4;
  // top pipe
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(p.x, 0, PIPE_W, p.topH);
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(p.x - capExtra, p.topH - capH, PIPE_W + capExtra * 2, capH);
  // pipe shading
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(p.x, 0, 6, p.topH);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(p.x + PIPE_W - 8, 0, 8, p.topH);

  // bottom pipe
  const botY = p.topH + GAP;
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(p.x, botY, PIPE_W, H - botY);
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(p.x - capExtra, botY, PIPE_W + capExtra * 2, capH);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(p.x, botY, 6, H - botY);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(p.x + PIPE_W - 8, botY, 8, H - botY);
}

function drawGround() {
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(0, H - 20, W, 20);
  ctx.fillStyle = '#34495e';
  ctx.fillRect(0, H - 20, W, 3);
}

function drawBg() {
  // sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0f3460');
  grad.addColorStop(0.7, '#16213e');
  grad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137.5 + 50) % W;
    const sy = (i * 97.3 + 20) % (H * 0.5);
    ctx.fillRect(sx, sy, 2, 2);
  }
}

function render() {
  drawBg();
  for (const p of pipes) drawPipe(p);
  drawGround();
  drawBird();

  // score on canvas
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(score, W / 2, 60);

  if (state === 'idle') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f7dc6f';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText('Click to Start', W / 2, H / 2 + 50);
  }

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 36px sans-serif';
    ctx.fillText('Game Over', W / 2, H / 2 - 10);
    ctx.fillStyle = '#f7dc6f';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('Click to Restart', W / 2, H / 2 + 30);
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
